related = ["时间", "现在", "同步"]
kind = "observation"
forth = "sun"

# ── 动作 ───────────────────────────────────────────────────────────────────────

[[word]]
word = "打印"
definition = "把栈顶的数字写到屏幕上"
related = ["显示", "输出", "看"]
kind = "task"
forth = ". cr"

[[word]]
word = "显示"
definition = "让不可见的东西变得可见"
related = ["打印", "输出", "屏幕"]
kind = "task"
forth = ". cr"

[[word]]
word = "清空"
