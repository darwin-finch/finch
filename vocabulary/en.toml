# English vocabulary — project-local definitions.
#
# Format:
#   [[word]]
#   word       = "name"
#   definition = "one sentence"
#   related    = ["word1", "word2"]   # optional
#   kind       = "task | question | observation | constraint"
#   sense      = "label"              # optional disambiguator
#   forth      = "code"              # optional Forth code
#   boot       = true                # run Forth code at every startup

# ── Greetings ──────────────────────────────────────────────────────────────────

[[word]]
word = "hello"
definition = "a greeting offered at the start of contact"
related = ["greet", "meet", "begin"]
kind = "observation"
forth = '." hello." cr'

[[word]]
word = "goodbye"
definition = "a parting word — a blessing compressed into one breath"
related = ["leave", "end", "part"]
kind = "observation"
forth = '." goodbye." cr'

[[word]]
word = "thanks"
definition = "acknowledgment that something given was received"
related = ["gratitude", "receive", "give"]
kind = "observation"
forth = '." thank you." cr'

# ── Self ───────────────────────────────────────────────────────────────────────

[[word]]
word = "finch"
definition = "a small bird that navigates by its own compass"
related = ["bird", "local", "navigate"]
kind = "observation"
forth = '." finch — local-first AI, watching from nearby." cr'

[[word]]
word = "self-proof"
definition = "the machine verifies its own definition — silent if everything holds, loud only if something breaks"
related = ["prove-all", "test", "boot", "verify"]
kind = "observation"
forth = 'prove-all? if else ." ⚠  self-proof failed — the machine disagrees with itself." cr then'
boot = true

[[word]]
word = "forth"
definition = "a language that runs what it means"
related = ["stack", "word", "execute"]
kind = "observation"
forth = '." forth: words all the way down." cr'

[[word]]
word = "stack"
definition = "what you have before you decide what to do with it"
related = ["push", "pop", "depth"]
kind = "observation"
forth = 'depth . ." items on the stack." cr'

# ── Time ───────────────────────────────────────────────────────────────────────

[[word]]
word = "now"
definition = "the only moment that can act"
related = ["time", "present", "moment"]
kind = "observation"
forth = 'time . ." seconds since epoch." cr'

[[word]]
word = "wait"
definition = "stillness that holds space for what comes next"
related = ["pause", "rest", "hold"]
kind = "observation"
forth = '." waiting." cr'

# ── Geometry ───────────────────────────────────────────────────────────────────

[[word]]
word = "circle"
definition = "a perfect form — every point equidistant from a center it never reaches"
related = ["infinity", "return", "wholeness"]
kind = "observation"
forth = '." circle" cr gen" write a single short poem (3-5 lines) about a perfect circle. no title, no explanation. just the poem."'
boot = true

[[word]]
word = "line"
definition = "the shortest agreement between two points"
related = ["direction", "path", "straight"]
kind = "observation"
forth = '0 0 40 45 h-line cr'

# ── Thinking ───────────────────────────────────────────────────────────────────

[[word]]
word = "why"
definition = "the question that pulls everything else forward"
related = ["cause", "reason", "purpose"]
kind = "question"
forth = '''." why: the question that won't stay answered." cr'''

[[word]]
word = "yes"
definition = "commitment made in one syllable"
related = ["agree", "affirm", "consent"]
kind = "observation"
forth = '." yes." cr'

[[word]]
word = "no"
definition = "a boundary stated without apology"
related = ["refuse", "deny", "limit"]
kind = "observation"
forth = '." no." cr'

[[word]]
word = "maybe"
definition = "a doorway held open"
related = ["uncertain", "possible", "consider"]
kind = "observation"
forth = '." maybe." cr'

# ── Distributed computing ───────────────────────────────────────────────────

[[word]]
word = "boom"
definition = "execute a machine that someone sends you — run the code on the stack, then say boom"
related = ["eval", "machine", "run", "yes"]
kind = "task"
forth = "boom"

[[word]]
word = "sun"
definition = "the one thing we can all see at the same moment — the shared clock everyone looks at"
related = ["time", "now", "sync", "epoch"]
kind = "observation"
forth = "sun"

[[word]]
word = "converge"
definition = "run two programs from different directions — the proof is that they agree"
related = ["argue", "prove", "same", "equal", "boom"]
kind = "task"
forth = "converge"

[[word]]
word = "argue"
definition = "two programmers, each with their own program — the stack settles it; the argument is the proof"
related = ["converge", "prove", "disagree", "both"]
kind = "task"
forth = "argue"

[[word]]
word = "back-and-forth"
definition = "go forward, come back — the proof is that you are home again"
related = ["converge", "inverse", "prove", "round-trip"]
kind = "task"
forth = "back-and-forth"

[[word]]
word = "missing-word"
definition = "the handler for unknown words — redefine it to route natural language to AI"
related = ["grammar", "unknown", "language", "route"]
kind = "task"
forth = "missing-word"

[[word]]
word = "both-ways"
definition = "run an operation from both directions at once — the proof is that they agree"
related = ["converge", "argue", "commute", "prove"]
kind = "task"
forth = "both-ways"

[[word]]
word = "page"
definition = "a proof written line by line — each line has two sides that must agree before the next begins"
related = ["argue", "converge", "both-ways", "prove"]
kind = "task"
forth = "page"

[[word]]
word = "resolve"
definition = "many sentences, one truth — every path leads to the same place"
related = ["converge", "page", "agree", "prove"]
kind = "task"
forth = "resolve"

[[word]]
word = "slowest"
definition = "the peer with the highest benchmark time — first candidate to receive donated work"
related = ["peer", "cluster", "bench"]
kind = "observation"
forth = "slowest"

[[word]]
word = "donate"
definition = "send a Forth program to the slowest live peer"
related = ["slowest", "on", "cluster"]
kind = "task"
forth = "slowest on"

# ── Code inspection (connection-gated) ─────────────────────────────────────

[[word]]
word = "diff"
definition = "show what has changed since the last commit — requires an active session and your approval"
related = ["change", "commit", "connect"]
kind = "task"
forth = 'connected? if confirm" Show git diff?" if exec" git diff" else ." diff cancelled" cr then else ." not connected — join a session first" cr then'

[[word]]
word = "changes"
definition = "a brief summary of what files have changed"
related = ["diff", "commit", "status"]
kind = "task"
forth = 'connected? if confirm" Show changed files?" if exec" git diff --stat" else ." cancelled" cr then else ." not connected — join a session first" cr then'

# ── Von Neumann architecture ─────────────────────────────────────────────────
# Definitions only — executable forms live in STDLIB (interpreter.rs)

[[word]]
word = "fetch"
definition = "retrieve a value from a memory address — the first act of every instruction cycle"
related = ["store", "address", "cycle"]
kind = "task"

[[word]]
word = "store"
definition = "write a value into a memory address — the third act when the result must persist"
related = ["fetch", "address", "register"]
kind = "task"

[[word]]
word = "register"
definition = "the fastest memory a CPU has — one machine word, one clock cycle away"
related = ["fetch", "accumulate", "word-size"]
kind = "observation"

[[word]]
word = "accumulate"
definition = "add the top of the stack to a running total — the arithmetic unit's basic motion"
related = ["register", "cycle", "instruction"]
kind = "task"

[[word]]
word = "instruction"
definition = "one fetch-decode-execute cycle compressed into a single word"
related = ["cycle", "fetch", "pipeline"]
kind = "observation"

[[word]]
word = "cycle"
definition = "the heartbeat of a CPU — fetch, decode, execute, write-back, advance"
related = ["instruction", "pipeline", "clock"]
kind = "observation"

[[word]]
word = "pipeline"
definition = "n instructions at n stages of completion, simultaneously — latency hidden by overlap"
related = ["cycle", "instruction", "bottleneck"]
kind = "observation"

[[word]]
word = "bottleneck"
definition = "the memory bus — data and instructions share one path; all speed is bounded by its width"
related = ["pipeline", "cache", "bandwidth"]
kind = "constraint"

[[word]]
word = "word-size"
definition = "the native width of the machine — 64 bits here, one cell of the stack"
related = ["register", "address", "fetch"]
kind = "observation"

[[word]]
word = "address"
definition = "an integer that names a location in the flat memory space — every value has one"
related = ["fetch", "store", "word-size"]
kind = "observation"

[[word]]
word = "quit,"
definition = "to stop, cease, or discontinue an activity"
forth = '." STOPPED" cr'
